# SimpleMall 本地开发依赖（由 ./dev.sh 自动拉起）
# 启动: docker compose up -d  或  ./dev.sh docker up
# 停止: docker compose stop     或  ./dev.sh stop --all

services:
  mysql:
    image: mysql:8.0
    container_name: simplemall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: simplemall
      TZ: Asia/Shanghai
    ports:
      - '3306:3306'
    volumes:
      - simplemall_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4

  redis:
    image: redis:7-alpine
    container_name: simplemall-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - simplemall_redis_data:/data

volumes:
  simplemall_mysql_data:
  simplemall_redis_data:
